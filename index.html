<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Login Carwash</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="left">
            <div class="overlay">
                <h2>ดูแลรถที่คุณรักด้วยมาตรฐานระดับ"พรีเมียม"</h2>
                <div class="stars">★★★★★</div>
            </div>
        </div>

        <div class="right">
            <div class="login-box">

                <h1>เข้าสู่ระบบ</h1>
                <p class="sub">จัดการการจองล้างรถของคุณได้อย่างง่ายดาย</p>

                <div class="role-box">
                    <p class="title">เลือกสถานะผู้ใช้งาน</p>

                    <div class="role-switch">

                        <input type="radio" id="customer" name="role" value="customer" checked>
                        <label for="customer">ลูกค้า</label>

                        <input type="radio" id="staff" name="role" value="staff">
                        <label for="staff">พนักงาน</label>

                        <input type="radio" id="owner" name="role" value="owner">
                        <label for="owner">เจ้าของร้าน</label>

                        <div class="slider"></div>

                    </div>
                </div>

                <label>อีเมล หรือ เบอร์โทรศัพท์</label>
                <input type="text" placeholder="กรอกอีเมล หรือ เบอร์โทรศัพท์">

                <label>รหัสผ่าน</label>
                <input type="password" placeholder="กรอกรหัสผ่าน">

                <p class="forgot">
                    <a href="password.html">ลืมรหัสผ่าน?</a>
                </p>
<!-- ค่อยดเปลื่อนหน้าตอนเชือม -->
                <button class="login-btn" onclick="login()">
                    เข้าสู่ระบบ ➜
                </button>

                <p class="register">
                    ยังไม่มีบัญชี? <a href="#">สมัครสมาชิก</a>
                </p>

            </div>
        </div>

    </div>

    <script>

        function login() {

            const role = document.querySelector('input[name="role"]:checked').value;

            if (role === "customer") {
                window.location.href = "booking.html";
            }

            else if (role === "staff") {
                window.location.href = "staff.html";
            }

            else if (role === "owner") {
                window.location.href = "owner.html";
            }

        }

    </script>

</body>

</html>
