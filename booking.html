<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>จองบริการ</title>
    <link rel="stylesheet" href="booking.css">
</head>

<body>

    <h1>เลือกแพ็กเกจล้างรถ</h1>

    <div class="package">
        <h2>Basic</h2>
        <p>ล้างภายนอก</p>
        <h3>฿150.60</h3>

        <button onclick="selectPackage('Basic',150)">
            เลือกแพ็กเกจ
        </button>
    </div>

    <div class="package">
        <h2>Premium</h2>
        <p>ล้าง + ดูดฝุ่น</p>
        <h3>฿299.50</h3>

        <button onclick="selectPackage('Premium',299.)">
            เลือกแพ็กเกจ
        </button>
    </div>

    <div class="package">
        <h2>VIP</h2>
        <p>ล้าง + เคลือบเงา</p>
        <h3>฿499.60</h3>

        <button onclick="selectPackage('VIP',499)">
            เลือกแพ็กเกจ
        </button>
    </div>

    <script src="script.js"></script>

</body>

</html>
